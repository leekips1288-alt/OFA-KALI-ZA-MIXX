<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixx by Yas Tanzania</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    color:white;
}

/* HERO */
.hero{
    background:url('file_000000008a20722f838c4e1e70198a00.png') no-repeat center;
    background-size:cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    background:rgba(0,0,0,0.7);
    padding:30px;
    border-radius:20px;
    text-align:center;
}

h1{
    color:#FFD700;
    font-size:38px;
}

.price{
    font-size:50px;
    color:#FFD700;
    font-weight:bold;
}

.btn{
    background:#0066ff;
    padding:15px 30px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    font-size:18px;
    display:inline-block;
    margin-top:20px;
}

.section{
    padding:40px 20px;
    text-align:center;
    background:#000;
}

.card{
    background:#111;
    margin:10px;
    padding:20px;
    border-radius:15px;
}

.highlight{
    border:2px solid gold;
}
</style>
</head>

<body>

<div class="hero">
    <div class="overlay">
        <h1>PATA INTERNET YA UHAKIKA 🚀</h1>
        <div class="price">75GB - Tsh 3,999 TU</div>
        <p>4G & 5G • Bila Kikomo</p>
        <a href="#" class="btn">JIUNGE SASA</a>
        <p>PIGA *147*00#</p>
    </div>
</div>

<div class="section">
    <h2>VIFURUSHI</h2>

    <div class="card">10GB — Tsh 1,000</div>
    <div class="card">25GB — Tsh 2,000</div>
    <div class="card highlight">75GB — BEST DEAL 🔥</div>
    <div class="card">150GB — Tsh 6,000</div>
</div>

<div class="section">
    <h2>OFa INAISHIA HIVI KARIBUNI!</h2>
    <a href="#" class="btn">ANZA SASA</a>
</div>

</body>
</html>
